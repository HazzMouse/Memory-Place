<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MemoryPlace</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <link rel="icon" type="image/x-icon" href="./images/favicon.png">
</head>
<body>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  </head>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <h2 class="sidebar-title">Memories</h2>
  <div id="memoryList"></div>
</div>


  <body>
  <!-- ── Add/Edit Memory Form ── -->
    <div id="memoryForm" class="hidden">
      <h2 id="formTitle">Add Memory</h2>
      <label>Title</label>
      <input id="memoryTitle" type="text" placeholder="A summer afternoon…" />
      <label>Description</label>
      <textarea id="memoryDescription" placeholder="Describe what you remember…"></textarea>

      <!-- Drag-and-drop image upload -->
      <label>Photo</label>
      <div class="image-upload-wrap" id="imageUploadWrap">
        <input type="file" id="memoryImage" accept="image/*" />
        <img id="imagePreview" class="image-preview hidden" />
        <div class="image-upload-placeholder" id="imagePlaceholder">
          <div class="upload-cloud">
            <svg viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M32 36V18M32 18L24 26M32 18L40 26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M48 36H52a8 8 0 000-16h-1.06A16 16 0 1012.26 36H16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="upload-main-label">Drop a photo here</span>
          <span class="upload-sub-label">or <span class="upload-browse-link">browse files</span></span>
          <span class="upload-hint">PNG, JPG, HEIC up to 20MB</span>
        </div>
        <div class="upload-drag-active-overlay" id="uploadDragOverlay">
          <div class="upload-drag-active-text">Drop to add photo</div>
        </div>
      </div>

      <div class="toggle-wrap" id="removeImageWrap" style="display:none">
        <label class="toggle-label">Remove Existing Image</label>
        <label class="toggle-switch">
          <input type="checkbox" id="removeImageCheckbox">
          <span class="slider"></span>
        </label>
      </div>
      <div class="form-actions">
        <button id="saveMemoryBtn" class="btn btn--primary">Save Memory</button>
        <button id="cancelMemoryBtn" class="btn btn--ghost">Cancel</button>
    </div>
  </div>

  <!-- ── Page Header ── -->
  <header>
    <img src="marker.png" class="header-logo" alt="MemoryPlace marker" />
    <h1>MemoryPlace</h1>
    <span class="header-sub">click anywhere on the map to add a memory</span>
  </header>

  <!-- ── Map ── -->
  <div id="map"></div>

  <!-- ── Dream Visualiser Overlay ── -->
  <div id="dream-overlay">
    <!-- Canvas fills the overlay -->
    <canvas id="dream-canvas"></canvas>

    <!-- Vignette -->
    <div class="dream-vignette"></div>

    <!-- Loading state -->
    <div id="dream-loading">
      <div class="dream-spinner"></div>
      <div class="dream-loading-text">dissolving into dream…</div>
    </div>

    <!-- Scene title + prompt -->
    <div class="dream-title-wrap">
      <div id="dream-title"></div>
      <div id="dream-prompt"></div>
    </div>

    <!-- Controls hint -->
    <div class="dream-controls-hint">drag to rotate &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; right-drag to pan</div>

    <!-- Tags -->
    <div id="dream-tags"></div>

    <!-- Back button -->
    <button id="dream-back-btn" onclick="closeDreamVisualiser()">← back to map</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
