<!DOCTYPE html>
<html>
  <head>
    <title>MemoryPlace</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  </head>

  <body>
    <div id="memoryForm" class="hidden">
      <h2>Add Memory</h2>
      <label>Title:</label>
      <input id="memoryTitle" type="text">

      <label>Description:</label>
      <textarea id="memoryDescription"></textarea>

      <button id="saveMemoryBtn">Save Memory</button>
      <button id="cancelMemoryBtn">Cancel</button>
    </div>
    
    <h1>MemoryPlace</h1>

    <div id="sidebar">
      <h2>Memories</h2>
      <ul id="memoryList"></ul>
    </div>

    <div id="map"></div>

    <script src="script.js"></script>
  </body>
</html>
