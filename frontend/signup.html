<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up – MemoryPlace</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">

  <div class="auth-card">
    <h1 class="auth-title">MemoryPlace</h1>
    <p class="auth-sub">create your account</p>

    <input id="email" type="email" class="auth-input" placeholder="Email">
    <input id="password" type="password" class="auth-input" placeholder="Password">

    <button id="signupBtn" class="auth-btn auth-btn-primary">Sign Up</button>

    <p class="auth-switch">
      Already have an account?
      <a href="login.html">Login</a>
    </p>
  </div>

  <script>
    document.getElementById("signupBtn").onclick = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("http://localhost:3000/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        window.location.href = "index.html";
      } else {
        alert(data.error || "Signup failed");
      }
    };
  </script>

</body>
</html>
