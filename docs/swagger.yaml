openapi: 3.0.0
info:
  title: Memory Map API
  description: A spatial memory storage tool designed to help individuals with dementia store and retrieve memories using map coordinates.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /api/memories:
    get:
      summary: Retrieve all memories
      description: Fetches the entire list of saved memories from the database.
      responses:
        '200':
          description: A successful response returning an array of memories.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memory'
    post:
      summary: Create a new memory
      description: Adds a new memory to the database. The system automatically generates a unique ID based on the timestamp.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryInput'
      responses:
        '201':
          description: Memory successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
        '400':
          description: Bad request. Missing required fields (title or location).

  /api/memories/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The unique identifier of the memory.
    put:
      summary: Edit an existing memory
      description: Modifies a specific memory by its ID. Only updates the fields provided in the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryInput'
      responses:
        '200':
          description: Memory successfully updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
        '404':
          description: Memory not found.
    delete:
      summary: Delete a memory
      description: Permanently removes a specific memory from the database based on its ID.
      responses:
        '200':
          description: Memory deleted successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Memory deleted successfully
        '404':
          description: Memory not found.

components:
  schemas:
    Location:
      type: object
      required:
        - lat
        - lng
      properties:
        lat:
          type: number
          format: float
          description: Latitude coordinate
          example: -33.8688
        lng:
          type: number
          format: float
          description: Longitude coordinate
          example: 151.2093

    Memory:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier generated by the server.
          example: "1710374400000"
        title:
          type: string
          description: A short, recognizable name for the memory.
          example: "A walk in the park"
        content:
          type: string
          description: The detailed description or story of the memory.
          example: "Feeding the ducks by the pond."
        location:
          $ref: '#/components/schemas/Location'
        time:
          type: string
          format: date-time
          description: When the memory occurred or was created.
          example: "2024-05-12T08:30:00.000Z"

    MemoryInput:
      type: object
      required:
        - title
        - location
      properties:
        title:
          type: string
          description: A short, recognizable name for the memory.
          example: "My Childhood Home"
        content:
          type: string
          description: The detailed description or story of the memory.
          example: "I grew up in this house."
        location:
          $ref: '#/components/schemas/Location'
        time:
          type: string
          format: date-time
          description: Optional date/time of the memory. Defaults to current time if omitted.
          example: "1985-06-15T00:00:00.000Z"